format = """
$username \
$directory \
$git_branch \
$git_metrics \
$cmd_duration \
$fill\
$python\
$lua\
$golang\
$package\
$localip\
$time\n\
[уұһӘ](fg:iris)
"""


palette = "rose-pine"

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[directory]
format = "[оӮ¶](fg:overlay)[ $path ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:gold"
truncation_length = 2
truncation_symbol = "вҖҰ/"

[cmd_duration]
min_time = 100
style = "bg:overlay fg:rose"
format = "[оӮ¶](fg:overlay)[уұҺ«$duration ]($style)[оӮҙ](fg:overlay)"

[directory.substitutions]
dotfiles = "о—Ҫ dot"
Documents = "у°Ҳҷ"
Downloads = "пҖҷ "
Music = "пҖҒ "
Pictures = "пҖҫ "
[fill]
style = "fg:overlay"
symbol = " "
[package]
format = "[оӮ¶](fg:overlay)[$version ]($style)[оӮҙ](fg:overlay)"

[golang]
style = "bg:overlay fg:foam"
format = "[оӮ¶](fg:overlay)[$symbol$version ]($style)[оӮҙ](fg:overlay)"

[lua]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[$symbol$version ]($style)[оӮҙ](fg:overlay)"

[python]
style = "bg:overlay fg:pine"
format = "[оӮ¶](fg:overlay)[$symbol$version ]($style)[оӮҙ](fg:overlay) "
disabled = false
symbol = 'рҹ‘ҫ '

[git_branch]
format = "[оӮ¶](fg:overlay)[ $symbol $branch ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:foam"
symbol = "пҗҳ"

[git_metrics]
disabled = false
format = '[оӮ¶](fg:overlay)[+$added]($added_style)[ -$deleted]($deleted_style)[оӮҙ](fg:overlay)'
only_nonzero_diffs = true
added_style = 'bg:overlay fg:pine'
deleted_style = 'bg:overlay fg:love'


[localip]
ssh_only = false
style = "bg:overlay fg:iris"
format = '[оӮ¶](fg:overlay)[уұҳ– $localipv4]($style)[оӮҙ](fg:overlay) '

disabled = false

[time]
disabled = false
format = "[оӮ¶](fg:overlay)[ $time у°ҙҲ ]($style)[оӮҙ](fg:overlay)"
style = "bg:overlay fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[оӮ¶](fg:overlay)[ у°§ұ $user ]($style)[оӮҙ](fg:overlay)"
show_always = true
style_root = "bg:overlay fg:iris"
style_user = "bg:overlay fg:iris"
